# Use H2 in-memory database for tests — avoids connecting to remote PostgreSQL
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable session store
spring.session.store-type=none

# Stub out external service URLs so beans initialise without real connections
librespot.service.url=http://localhost:8888
spotify.client-id=test
spotify.client-secret=test
spotify.redirect-uri=http://localhost/callback

# JWT
jwt.secret=test-secret-for-unit-tests
jwt.expiration=86400000

# GCP Storage
gcp.storage.bucket-name=test-bucket
gcp.storage.project-id=test-project