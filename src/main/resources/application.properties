spring.application.name=sonicLens

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/soniclens
spring.datasource.username=postgres
spring.datasource.password=secret
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Multipart
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=52MB

# Disable Spring Session JDBC (app is stateless JWT)
spring.session.store-type=none

# Batch inserts for fingerprints
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true

# Spotify
spotify.client-id=${SPOTIFY_CLIENT_ID}
spotify.client-secret=${SPOTIFY_CLIENT_SECRET}
spotify.redirect-uri=http://127.0.0.1:8080/callback

# Go librespot microservice URL (see librespot-service/ directory)
librespot.service.url=http://localhost:8888

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# GCP Storage
gcp.storage.bucket-name=${GCS_BUCKET_NAME}
gcp.storage.project-id=${GCP_PROJECT_ID}
